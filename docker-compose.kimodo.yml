services:
  kimodo:
    build:
      context: .
      dockerfile: services/kimodo/Dockerfile
      args:
        KIMODO_REF: ${KIMODO_REF:-1aece8c124d73d255ceff5086d983b844c9f4e94}
        PIP_INDEX_URL: ${KIMODO_PIP_INDEX_URL:-https://pypi.org/simple}
    image: 3d-director-desk-kimodo:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${KIMODO_PORT:-8787}:8787"
    environment:
      HF_HOME: /cache/huggingface
      KIMODO_DATA_DIR: /data
      KIMODO_CORS_ORIGINS: ${KIMODO_CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5174,http://localhost:5174}
      KIMODO_MAX_ATTEMPTS: ${KIMODO_MAX_ATTEMPTS:-2}
      KIMODO_LEASE_SECONDS: ${KIMODO_LEASE_SECONDS:-30}
      TEXT_ENCODER_DEVICE: ${TEXT_ENCODER_DEVICE:-cpu}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-0}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
    secrets:
      - hf_token
    volumes:
      - kimodo-data:/data
      - kimodo-hf-cache:/cache/huggingface
    gpus: all
    shm_size: 8gb
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/api/v1/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 6

secrets:
  hf_token:
    file: ${HF_TOKEN_FILE:-./.secrets/hf-token}

volumes:
  kimodo-data:
  kimodo-hf-cache:
